name: Scheduled Security Scan

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  scan-image:
    name: Build and scan image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image with fresh base layers
        uses: docker/build-push-action@v7
        with:
          context: .
          pull: true
          load: true
          tags: tracker-dashboard:security-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan planifie = MONITORING : on genere le rapport et on l'envoie dans
      # l'onglet Security, mais on NE fait PAS echouer le run (exit-code 0).
      # Le hard-fail bloquant vit dans pr-checks.yml (sur les PR vers main).
      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: tracker-dashboard:security-scan
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
