name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Uniquement pour les PR ouvertes par Dependabot
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch updates only
        # On n'auto-merge QUE les patches — minor et major restent en review manuelle.
        # Le `|| echo` evite un run rouge si "Allow auto-merge" n'est pas active
        # dans Settings → General (la PR reste juste a merger manuellement).
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr merge --auto --squash "$PR_URL" \
            || echo "::warning::Auto-merge indisponible — active 'Allow auto-merge' dans Settings → General et une branch protection sur main. PR laissee a merger manuellement."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
