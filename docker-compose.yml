services:
  tracker-dashboard:
    image: ghcr.io/aerya/tracker-dashboard:latest
    container_name: tracker-dashboard
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Token pour proteger l'endpoint /metrics (Prometheus).
      # Laisse vide ou retire la ligne pour desactiver l'export (l'endpoint renverra 503).
      METRICS_TOKEN: ""
    volumes:
      - ./config:/app/config
