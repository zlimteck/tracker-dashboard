services:
  tracker-dashboard:
    image: ghcr.io/aerya/tracker-dashboard:latest
    container_name: tracker-dashboard
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Token pour proteger l'endpoint /metrics (Prometheus)
      # Laisser vide ou retirer la ligne pour desactiver l'export (l'endpoint renverra une erreur 503)
      METRICS_TOKEN: ""
      # Pour un test ponctuel sans token : METRICS_PUBLIC=true
      # Ne pas laisser actif si l'instance est exposee hors reseau local.
      # METRICS_PUBLIC: "true"
    volumes:
      - ./config:/app/config
