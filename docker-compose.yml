services:
  tracker-dashboard:
    image: ghcr.io/aerya/tracker-dashboard:latest
    container_name: tracker-dashboard
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Token pour proteger l'endpoint /metrics (Prometheus)
      # Laisser vide ou retirer la ligne pour desactiver l'export (l'endpoint renverra une erreur 503)
      METRICS_TOKEN: ""
    volumes:
      - ./config:/app/config
